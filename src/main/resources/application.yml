spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vpn_bot
    username: vpn_user
    password: vpn_pass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      password: ${REDIS_PASSWORD:supersecret123}
      timeout: 2s
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    org.springframework.boot.autoconfigure: DEBUG
    org.springframework.boot.context.config: DEBUG

app:
  rate-limit:
    window-seconds: 3
    max-requests: 3
  idempotency:
    ttl-seconds: 10
    update-ttl-seconds: 600
  vpn-keys:
    unused-ttl-hours: 24
    cleanup-delay-ms: 3600000
  subscriptions:
    notify-delay-ms: 3600000
    expire-check-delay-ms: 300000
  payments:
    reconcile-delay-ms: 60000
    fast-check-delays-ms: 3000,8000,15000
  subscription-plans:
    plan1:
      months: 1
      days: 30
      price: 100
      label: "1 месяц"
    plan2:
      months: 2
      days: 60
      price: 170
      label: "2 месяца"
  referral:
    referrer-days: 7
    referred-days: 3

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}
  admin-ids: "980389038"
  support-username: ${TELEGRAM_SUPPORT_USERNAME:@xdersee}
  main-menu-text: |-
    🏰 WayGuard
    ━━━━━━━━━━━━
    Добро пожаловать!
    Выберите раздел ниже 👇

  instructions-text: |-
    📘 Инструкция подключения
    ━━━━━━━━━━━━
    🔑 Шаг 1. Получите ключ
    1) Откройте раздел «Мои ключи»
    2) Нажмите «Новый ключ»
    3) Скопируйте ключ полностью

    📌 Важно:
    Ключ начинается с vless://
    Копируйте его целиком, без изменений и лишних символов

    📲 Шаг 2. Установите Happ
    iOS: https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973?l=en-GB
    Android: https://play.google.com/store/apps/details?id=com.happproxy

    ⚙️ Шаг 3. Подключите ключ в Happ
    1) Откройте приложение Happ
    2) Нажмите «Добавить» или «Импорт»
    3) Выберите «Из буфера обмена»
    4) Дождитесь добавления конфигурации
    5) Включите подключение

    ✅ Если телефон попросит разрешение на создание VPN-подключения, подтвердите его.

    ♻️ Если ключ не работает, вы можете заменить его в разделе «Мои ключи».

    🌐 При переключении между разными сетями Wi‑Fi иногда бывают перебои в подключении.
    В таком случае лучше просто перезапустить VPN в приложении.

    ❗️Если импорт из буфера не появился или не сработал, вставьте ключ вручную через «Добавить».


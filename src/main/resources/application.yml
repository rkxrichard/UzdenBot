spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vpn_bot
    username: vpn_user
    password: vpn_pass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      password: ${REDIS_PASSWORD:supersecret123}
      timeout: 2s
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    org.springframework.boot.autoconfigure: DEBUG
    org.springframework.boot.context.config: DEBUG

app:
  rate-limit:
    window-seconds: 3
    max-requests: 3
  idempotency:
    ttl-seconds: 10
    update-ttl-seconds: 600
  vpn-keys:
    unused-ttl-hours: 24
    cleanup-delay-ms: 3600000
  subscriptions:
    notify-delay-ms: 3600000
    expire-check-delay-ms: 300000
  payments:
    reconcile-delay-ms: 60000
    fast-check-delays-ms: 3000,8000,15000
  subscription-plans:
    plan1:
      months: 1
      days: 30
      price: 70
      label: "1 месяц"
    plan2:
      months: 2
      days: 60
      price: 120
      label: "2 месяца"
  referral:
    referrer-days: 7
    referred-days: 3

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}
  admin-ids: "980389038,592239190"
  support-username: ${TELEGRAM_SUPPORT_USERNAME:@your_support}
  main-menu-text: |-
    🏰 REDCastle
    ━━━━━━━━━━━━
    Добро пожаловать!
    Выберите раздел ниже 👇

  instructions-text: |-
    📘 Инструкция подключения
    ━━━━━━━━━━━━
    🔑 Где взять ключ: меню «Мои ключи» → «Новый ключ»
    📌 Ключ начинается с vless:// — копируйте его полностью

    📱 iPhone (v2rayTun):
    1) Скопируйте ключ
    2) Откройте v2rayTun → + → Import from Clipboard
    3) Сохраните и включите

    🤖 Android (Happ):
    1) Скопируйте ключ
    2) Откройте Happ → Добавить/Импорт → Из буфера обмена
    3) Сохраните и включите

    ❗️Если импорт не появился, вставьте ключ вручную через «Добавить».

